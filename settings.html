<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Freshservice 작업 시나리오 설정</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main>
    <header>
      <h1>Freshservice 작업 시나리오</h1>
      <p>서버 없이 확장프로그램에서 Freshservice API를 직접 호출합니다.</p>
      <span id="version" class="version"></span>
    </header>

    <ol class="steps">
      <li>아래 값을 입력하고 <strong>저장</strong>을 누릅니다.</li>
      <li>저장 후 자동으로 <strong>연결 확인</strong>이 실행됩니다.</li>
    </ol>

    <label for="fsDomain">FS_DOMAIN</label>
    <input id="fsDomain" type="text" placeholder="acme 또는 acme.freshservice.com" spellcheck="false">

    <label for="fsApiKey">FS_API_KEY</label>
    <input id="fsApiKey" type="password" placeholder="Freshservice 개인 API 키" spellcheck="false">

    <div class="actions">
      <button id="save" type="button">저장</button>
      <button id="test" type="button">연결 확인</button>
    </div>

    <p class="note">
      <strong>개인 API 키</strong>를 사용하며, 이 브라우저의 <strong>로컬 저장소</strong>에만 저장됩니다.
      Freshservice 작업 이력은 이 API 키 사용자 기준으로 기록됩니다. 공유 PC에서는 사용 후 삭제하세요.
    </p>
    <div id="status" role="status" aria-live="polite"></div>
  </main>
  <script src="settings.js"></script>
</body>
</html>
